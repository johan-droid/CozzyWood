<svg width="1600" height="420" viewBox="0 0 1600 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Cozzywood Animated Banner</title>
  <desc id="desc">Animated banner with gradient background, floating orbs, and project title.</desc>
  <defs>
    <linearGradient id="bg" x1="120" y1="20" x2="1480" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0B1020"/>
      <stop offset="35%" stop-color="#1B2A4A"/>
      <stop offset="68%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#F97316"/>
      <animate attributeName="x1" values="120;260;120" dur="12s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="1480;1360;1480" dur="12s" repeatCount="indefinite"/>
    </linearGradient>
    <linearGradient id="shine" x1="260" y1="80" x2="1340" y2="340" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.08"/>
      <stop offset="50%" stop-color="#FFFFFF" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.04"/>
      <animate attributeName="x1" values="260;380;260" dur="10s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="1340;1220;1340" dur="10s" repeatCount="indefinite"/>
    </linearGradient>
    <filter id="blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="28"/>
    </filter>
  </defs>

  <rect width="1600" height="420" rx="36" fill="#0B1020"/>
  <rect width="1600" height="420" rx="36" fill="url(#bg)"/>
  <rect x="40" y="40" width="1520" height="340" rx="28" fill="url(#shine)"/>

  <g filter="url(#blur)" opacity="0.95">
    <circle cx="240" cy="120" r="78" fill="#22D3EE">
      <animate attributeName="cy" values="120;150;120" dur="7s" repeatCount="indefinite"/>
      <animate attributeName="cx" values="240;280;240" dur="11s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1320" cy="110" r="96" fill="#FB7185">
      <animate attributeName="cy" values="110;142;110" dur="9s" repeatCount="indefinite"/>
      <animate attributeName="cx" values="1320;1270;1320" dur="13s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1220" cy="320" r="112" fill="#F59E0B">
      <animate attributeName="cy" values="320;286;320" dur="8s" repeatCount="indefinite"/>
      <animate attributeName="cx" values="1220;1260;1220" dur="12s" repeatCount="indefinite"/>
    </circle>
    <circle cx="360" cy="316" r="120" fill="#A78BFA">
      <animate attributeName="cy" values="316;284;316" dur="10s" repeatCount="indefinite"/>
      <animate attributeName="cx" values="360;320;360" dur="14s" repeatCount="indefinite"/>
    </circle>
  </g>

  <g opacity="0.24">
    <path d="M140 88H1460" stroke="#FFFFFF" stroke-width="2" stroke-dasharray="4 14"/>
    <path d="M140 332H1460" stroke="#FFFFFF" stroke-width="2" stroke-dasharray="4 14"/>
  </g>

  <g transform="translate(120 124)">
    <rect x="0" y="0" width="128" height="128" rx="30" fill="#FFFFFF" fill-opacity="0.08" stroke="#FFFFFF" stroke-opacity="0.12"/>
    <path d="M37 40H91C100.389 40 108 47.6112 108 57V83C108 92.3888 100.389 100 91 100H55.5L38 113V100H37C27.6112 100 20 92.3888 20 83V57C20 47.6112 27.6112 40 37 40Z" fill="#FFFFFF" fill-opacity="0.92"/>
    <path d="M52 61H84M52 77H74" stroke="#0B1020" stroke-width="8" stroke-linecap="round"/>
  </g>

  <g transform="translate(290 104)">
    <text x="0" y="0" fill="#FFFFFF" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="700" letter-spacing="6">COZZYWOOD</text>
    <text x="0" y="66" fill="#FFFFFF" font-family="Arial, Helvetica, sans-serif" font-size="82" font-weight="800">Realtime media rooms</text>
    <text x="0" y="126" fill="#E5E7EB" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="500">Chat, sync playback, uploads, Spotify, YouTube, and WebRTC in one stack.</text>
  </g>

  <g transform="translate(292 280)">
    <rect x="0" y="0" width="176" height="44" rx="22" fill="#FFFFFF" fill-opacity="0.14" stroke="#FFFFFF" stroke-opacity="0.10"/>
    <text x="24" y="29" fill="#FFFFFF" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700">Node + Express</text>

    <rect x="196" y="0" width="148" height="44" rx="22" fill="#FFFFFF" fill-opacity="0.14" stroke="#FFFFFF" stroke-opacity="0.10"/>
    <text x="220" y="29" fill="#FFFFFF" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700">React</text>

    <rect x="364" y="0" width="154" height="44" rx="22" fill="#FFFFFF" fill-opacity="0.14" stroke="#FFFFFF" stroke-opacity="0.10"/>
    <text x="388" y="29" fill="#FFFFFF" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700">Prisma</text>

    <rect x="538" y="0" width="176" height="44" rx="22" fill="#FFFFFF" fill-opacity="0.14" stroke="#FFFFFF" stroke-opacity="0.10"/>
    <text x="562" y="29" fill="#FFFFFF" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700">Socket.IO</text>

    <rect x="734" y="0" width="166" height="44" rx="22" fill="#FFFFFF" fill-opacity="0.14" stroke="#FFFFFF" stroke-opacity="0.10"/>
    <text x="758" y="29" fill="#FFFFFF" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700">WebRTC</text>
  </g>
</svg>